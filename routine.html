<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Routine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --card: #161b28;
    --border: #1e2535;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --accent3: #2ec4a0;
    --accent4: #f7a14f;
    --accent5: #e05c7a;
    --text: #e2e8f8;
    --muted: #5a6580;
    --highlight: #1e2a45;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 40px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(79,142,247,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .title-block h1 {
    font-size: 1.9rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #4f8ef7, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .title-block p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .live-clock {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    text-align: right;
  }

  .live-clock .time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .live-clock .day-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* TODAY BANNER */
  .today-banner {
    background: linear-gradient(135deg, var(--highlight), #1a1f35);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .today-badge {
    background: var(--accent);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .today-info {
    font-size: 0.88rem;
    color: var(--text);
    font-weight: 600;
  }

  .today-info span { color: var(--muted); font-weight: 400; }

  /* NAV TABS */
  .day-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .tab:hover { border-color: var(--accent); color: var(--text); }

  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .tab.is-today::after {
    content: '';
    position: absolute;
    top: 5px; right: 5px;
    width: 6px; height: 6px;
    background: #2ec4a0;
    border-radius: 50%;
  }

  /* SCHEDULE GRID */
  .schedule { display: none; flex-direction: column; gap: 10px; }
  .schedule.visible { display: flex; }

  .slot {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.3s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .slot:hover { border-color: var(--accent); transform: translateX(3px); }

  .slot.active-now {
    border-color: var(--accent3);
    background: linear-gradient(135deg, #0f2a23, var(--card));
  }

  .slot.active-now::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent3);
    border-radius: 3px 0 0 3px;
  }

  .slot.break-slot {
    background: linear-gradient(135deg, #1a1520, var(--card));
    border-style: dashed;
    opacity: 0.7;
  }

  .time-col {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
    min-width: 80px;
    line-height: 1.5;
  }

  .time-col .t-start { color: var(--text); font-size: 0.85rem; font-weight: 600; }

  .subject-tag {
    padding: 6px 14px;
    border-radius: 7px;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .subject-info { flex: 1; }
  .subject-name { font-size: 1rem; font-weight: 700; }
  .subject-type {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .now-pill {
    background: var(--accent3);
    color: #0a1a14;
    font-size: 0.62rem;
    font-weight: 800;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* SUBJECT COLORS */
  .c-dsp   { background: rgba(79,142,247,0.15); color: #4f8ef7; border: 1px solid rgba(79,142,247,0.3); }
  .c-cn    { background: rgba(124,92,191,0.15); color: #a78bfa; border: 1px solid rgba(124,92,191,0.3); }
  .c-wad   { background: rgba(46,196,160,0.15); color: #2ec4a0; border: 1px solid rgba(46,196,160,0.3); }
  .c-stat  { background: rgba(247,161,79,0.15); color: #f7a14f; border: 1px solid rgba(247,161,79,0.3); }
  .c-eth   { background: rgba(224,92,122,0.15); color: #e05c7a; border: 1px solid rgba(224,92,122,0.3); }
  .c-break { background: rgba(90,101,128,0.1);  color: var(--muted); border: 1px solid rgba(90,101,128,0.2); }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
  }

  .empty-day {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .empty-day .icon { font-size: 2.5rem; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="title-block">
      <h1>Class Routine</h1>
      <p>CSE · Semester Schedule</p>
    </div>
    <div class="live-clock">
      <div class="time" id="clock">--:--:--</div>
      <div class="day-label" id="clock-day">Loading...</div>
    </div>
  </header>

  <div class="today-banner" id="today-banner">
    <span class="today-badge">Today</span>
    <div class="today-info" id="today-info">Loading schedule...</div>
  </div>

  <div class="day-tabs" id="day-tabs"></div>

  <div id="schedules-container"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4f8ef7"></div>DSP</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>CN</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2ec4a0"></div>WAD</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f7a14f"></div>STAT</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e05c7a"></div>Ethics</div>
    <div class="legend-item"><div class="legend-dot" style="background:#5a6580"></div>Break</div>
  </div>

</div>

<script>
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// Schedule data — [startH, startM, endH, endM, subject, colorClass, type]
const schedule = {
  Saturday: [
    [10,40,12,15,'CN','c-cn','Lecture'],
    [13,0,13,45,'BREAK','c-break','Break'],
    [14,50,15,40,'Ethics','c-eth','Lecture'],
  ],
  Sunday: [
    [9,50,10,35,'DSP','c-dsp','Lecture'],
    [10,40,12,15,'DSP Lab','c-dsp','Lab'],
    [12,20,13,5,'STAT','c-stat','Lecture'],
    [13,0,14,0,'BREAK','c-break','Break'],
    [14,50,15,40,'CN Lab','c-cn','Lab'],
  ],
  Monday: [
    [9,50,10,35,'WAD','c-wad','Lecture'],
    [10,40,12,15,'DSP','c-dsp','Lecture'],
    [13,0,14,0,'BREAK','c-break','Break'],
    [14,50,15,40,'RM Lab','c-stat','Lab'],
  ],
  Tuesday: [
    [9,50,11,25,'WAD','c-wad','Lecture'],
    [11,30,12,15,'CN','c-cn','Lecture'],
    [13,0,14,0,'BREAK','c-break','Break'],
    [14,50,15,40,'STAT','c-stat','Lecture'],
  ],
  Wednesday: [
    [10,40,12,15,'WAD Lab','c-wad','Lab'],
    [13,0,14,0,'BREAK','c-break','Break'],
  ],
  Thursday: [],
  Friday: [],
};

function pad(n){ return String(n).padStart(2,'0'); }

function toMins(h,m){ return h*60+m; }

function formatTime(h,m){
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${pad(m)} ${ampm}`;
}

function getCurrentMins(){
  const now = new Date();
  return toMins(now.getHours(), now.getMinutes());
}

function buildSlot(slot, nowMins){
  const [sh,sm,eh,em,subj,cls,type] = slot;
  const start = toMins(sh,sm);
  const end = toMins(eh,em);
  const isNow = nowMins >= start && nowMins < end;
  const isBreak = subj === 'BREAK';

  const div = document.createElement('div');
  div.className = `slot${isNow ? ' active-now' : ''}${isBreak ? ' break-slot' : ''}`;
  div.style.animationDelay = '0ms';

  div.innerHTML = `
    <div class="time-col">
      <div class="t-start">${formatTime(sh,sm)}</div>
      <div>→ ${formatTime(eh,em)}</div>
    </div>
    <span class="subject-tag ${cls}">${subj}</span>
    <div class="subject-info">
      <div class="subject-name">${isBreak ? 'Break' : subj}</div>
      <div class="subject-type">${type} · ${eh*60+em - sh*60-sm} min</div>
    </div>
    ${isNow ? '<span class="now-pill">NOW</span>' : ''}
  `;
  return div;
}

function renderDay(day){
  const slots = schedule[day];
  const container = document.createElement('div');
  container.className = 'schedule';
  container.id = `sched-${day}`;

  if(!slots || slots.length === 0){
    container.innerHTML = `<div class="empty-day"><div class="icon">🎉</div>No classes today. Rest up!</div>`;
    return container;
  }

  const nowMins = getCurrentMins();
  slots.forEach((slot, i) => {
    const el = buildSlot(slot, nowMins);
    el.style.animationDelay = `${i * 50}ms`;
    container.appendChild(el);
  });
  return container;
}

function setActiveTab(day){
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.day === day));
  document.querySelectorAll('.schedule').forEach(s => s.classList.toggle('visible', s.id === `sched-${day}`));
}

function buildUI(){
  const today = DAYS[new Date().getDay()];
  const tabsEl = document.getElementById('day-tabs');
  const container = document.getElementById('schedules-container');
  const schoolDays = ['Saturday','Sunday','Monday','Tuesday','Wednesday'];

  schoolDays.forEach(day => {
    const tab = document.createElement('button');
    tab.className = `tab${day === today ? ' is-today' : ''}`;
    tab.dataset.day = day;
    tab.textContent = day.slice(0,3);
    tab.onclick = () => setActiveTab(day);
    tabsEl.appendChild(tab);

    container.appendChild(renderDay(day));
  });

  // Auto-select today or Saturday
  const activeDay = schoolDays.includes(today) ? today : 'Saturday';
  setActiveTab(activeDay);
  updateTodayBanner(today, activeDay);
}

function updateTodayBanner(today, activeDay){
  const infoEl = document.getElementById('today-info');
  const slots = schedule[today] || [];
  const nowMins = getCurrentMins();

  const current = slots.find(s => nowMins >= toMins(s[0],s[1]) && nowMins < toMins(s[2],s[3]));
  const next = slots.find(s => toMins(s[0],s[1]) > nowMins);

  if(!['Saturday','Sunday','Monday','Tuesday','Wednesday'].includes(today)){
    infoEl.innerHTML = `No classes today — <span>enjoy your day!</span>`;
    return;
  }

  if(current){
    infoEl.innerHTML = `In session: <strong>${current[4]}</strong> &nbsp;·&nbsp; <span>Ends at ${formatTime(current[2],current[3])}</span>`;
  } else if(next){
    infoEl.innerHTML = `Next: <strong>${next[4]}</strong> &nbsp;·&nbsp; <span>Starts at ${formatTime(next[0],next[1])}</span>`;
  } else {
    infoEl.innerHTML = `All classes done for today <span>— you're free!</span>`;
  }
}

function updateClock(){
  const now = new Date();
  const h = pad(now.getHours()), m = pad(now.getMinutes()), s = pad(now.getSeconds());
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  document.getElementById('clock-day').textContent = DAYS[now.getDay()];
}

buildUI();
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
